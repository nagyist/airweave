components:
  schemas:
    SourceConnectionCreate:
      examples: null
    SourceConnectionUpdate:
      examples: null

    AgenticSearchEvent:
      oneOf:
        - $ref: "#/components/schemas/AgenticSearchStartedEvent"
        - $ref: "#/components/schemas/AgenticSearchThinkingEvent"
        - $ref: "#/components/schemas/AgenticSearchToolCallEvent"
        - $ref: "#/components/schemas/AgenticSearchRerankingEvent"
        - $ref: "#/components/schemas/AgenticSearchDoneEvent"
        - $ref: "#/components/schemas/AgenticSearchErrorEvent"
      discriminator:
        propertyName: type
        mapping:
          started: "#/components/schemas/AgenticSearchStartedEvent"
          thinking: "#/components/schemas/AgenticSearchThinkingEvent"
          tool_call: "#/components/schemas/AgenticSearchToolCallEvent"
          reranking: "#/components/schemas/AgenticSearchRerankingEvent"
          done: "#/components/schemas/AgenticSearchDoneEvent"
          error: "#/components/schemas/AgenticSearchErrorEvent"

    AgenticSearchStartedEvent:
      type: object
      required: [type, request_id, tier, collection_readable_id, query]
      properties:
        type:
          type: string
          enum: [started]
        request_id:
          type: string
        tier:
          type: string
        collection_readable_id:
          type: string
        query:
          type: string
        thinking:
          type: boolean
          nullable: true
        filter:
          type: array
          nullable: true
          items:
            type: object
        limit:
          type: integer
          nullable: true

    AgenticSearchThinkingEvent:
      type: object
      required: [type, duration_ms, diagnostics]
      properties:
        type:
          type: string
          enum: [thinking]
        thinking:
          type: string
          nullable: true
          description: Extended reasoning text from the LLM.
        text:
          type: string
          nullable: true
          description: Conversational text output before tool calls.
        duration_ms:
          type: integer
        diagnostics:
          type: object
          properties:
            iteration:
              type: integer
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer

    AgenticSearchToolCallEvent:
      type: object
      required: [type, tool_name, duration_ms, diagnostics]
      properties:
        type:
          type: string
          enum: [tool_call]
        tool_name:
          type: string
          description: "Name of the tool: search, read, add_to_results, remove_from_results, count, get_children, get_siblings, get_parent, review_results, return_results_to_user."
        duration_ms:
          type: integer
        diagnostics:
          type: object
          properties:
            iteration:
              type: integer
            tool_call_id:
              type: string
            arguments:
              type: object
              description: Full LLM-generated tool input.
            stats:
              type: object
              description: Tool-specific output stats. Shape depends on tool_name.

    AgenticSearchRerankingEvent:
      type: object
      required: [type, duration_ms, diagnostics]
      properties:
        type:
          type: string
          enum: [reranking]
        duration_ms:
          type: integer
        diagnostics:
          type: object
          properties:
            input_count:
              type: integer
            output_count:
              type: integer
            model:
              type: string
            top_relevance_score:
              type: number
            bottom_relevance_score:
              type: number

    AgenticSearchDoneEvent:
      type: object
      required: [type, results, duration_ms]
      properties:
        type:
          type: string
          enum: [done]
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
          description: Full result set.
        duration_ms:
          type: integer
        diagnostics:
          type: object
          nullable: true
          properties:
            total_iterations:
              type: integer
            all_seen_entity_ids:
              type: array
              items:
                type: string
            all_read_entity_ids:
              type: array
              items:
                type: string
            all_collected_entity_ids:
              type: array
              items:
                type: string
            max_iterations_hit:
              type: boolean
            total_llm_retries:
              type: integer
            stagnation_nudges_sent:
              type: integer
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            cache_creation_input_tokens:
              type: integer
            cache_read_input_tokens:
              type: integer

    AgenticSearchErrorEvent:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string
          description: Error message.
        duration_ms:
          type: integer

paths:
  /collections/{readable_id}/search/agentic/stream:
    post:
      x-fern-streaming:
        format: sse
      responses:
        "200":
          description: SSE stream of agentic search events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgenticSearchEvent"
